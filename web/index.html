<!DOCTYPE html>
<html lang="en">
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="IE=Edge">

  <!-- Primary Meta -->
  <title>Infected</title>
  <meta name="description" content="Infected — A premium social media experience with real-time messaging, stories, reels, and video calls.">
  <meta name="theme-color" content="#C039FF">

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png">

  <!-- Apple / iOS PWA -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Infected">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Open Graph -->
  <meta property="og:title" content="Infected">
  <meta property="og:description" content="A premium social media experience.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="icons/Icon-512.png">

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Infected">
  <meta name="twitter:description" content="A premium social media experience.">
</head>
<body>
  <!-- Splash background while Flutter boots -->
  <style>
    body {
      background-color: #0D0D1A;
      margin: 0;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    #splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      opacity: 1;
      transition: opacity 0.4s ease;
    }
    #splash.hidden { opacity: 0; pointer-events: none; }
    #splash-text {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #C039FF, #9B59B6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.5px;
    }
    #splash-sub {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 13px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 2px;
      text-transform: uppercase;
    }
  </style>
  <div id="splash">
    <div id="splash-text">Infected</div>
    <div id="splash-sub">Premium Social Experience</div>
  </div>

  <script>
    // Hide native splash once Flutter renders its first frame
    window.addEventListener('flutter-first-frame', function () {
      var splash = document.getElementById('splash');
      if (splash) {
        splash.classList.add('hidden');
        setTimeout(function() { splash.remove(); }, 400);
      }
    });
  </script>

  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
