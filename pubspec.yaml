name: infected_insta
description: "Infected — A premium social media app with real-time messaging, stories, reels, and video calls."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  # ── UI & Icons ──────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  font_awesome_flutter: ^11.0.0
  google_fonts: ^8.0.2
  cached_network_image: ^3.4.1

  # ── State Management & Navigation ───────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod: ^2.6.1
  go_router: ^17.0.1
  provider: ^6.1.5+1          # kept for SettingsProvider (ChangeNotifier)

  # ── Backend (Supabase) ───────────────────────────────────────────────────────
  supabase_flutter: ^2.0.0

  # ── Media ───────────────────────────────────────────────────────────────────
  image_picker: ^1.2.1
  video_player: ^2.10.1

  # ── Calls (WebRTC + Metered TURN) ───────────────────────────────────────────
  flutter_webrtc: ^1.4.1

  # ── Voice messages ──────────────────────────────────────────────────────────
  record: ^5.1.2
  just_audio: ^0.9.40
  path_provider: ^2.1.4

  # ── Auth (Google OAuth) ─────────────────────────────────────────────────────
  google_sign_in: ^7.2.0

  # ── Utilities ───────────────────────────────────────────────────────────────
  uuid: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
